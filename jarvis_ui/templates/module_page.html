<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>{{title}}</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#020817;
    color:white;
    font-family:Arial;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* ================= BACKGROUND ================= */

.background{

    position:absolute;
    width:100%;
    height:100%;

    background-image:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);

    background-size:40px 40px;
}

/* ================= MODULE BOX ================= */

.module-box{

    position:relative;

    width:700px;

    padding:50px;

    border-radius:25px;

    background:rgba(0,255,255,0.05);

    border:2px solid rgba(0,255,255,0.4);

    text-align:center;

    backdrop-filter:blur(8px);

    box-shadow:
    0 0 20px rgba(0,255,255,0.3),
    0 0 60px rgba(0,255,255,0.2);
}

.module-title{

    font-size:55px;

    color:#00e5ff;

    margin-bottom:20px;

    text-shadow:
    0 0 10px #00e5ff,
    0 0 30px #00e5ff;
}

.module-description{

    font-size:22px;

    color:#cbd5e1;

    margin-bottom:40px;
}

/* ================= BUTTONS ================= */

.btn{

    display:inline-block;

    padding:15px 35px;

    border-radius:12px;

    background:#00e5ff;

    color:black;

    text-decoration:none;

    font-weight:bold;

    transition:0.3s;

    margin:10px;
}

.btn:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 20px #00e5ff;
}

.status{

    margin-top:30px;

    color:#7dd3fc;

    letter-spacing:2px;
}

</style>

</head>

<body>

<div class="background"></div>

<div class="module-box">

    <div class="module-title">
        {{title}}
    </div>

    <div class="module-description">
        {{description}}
    </div>

    <a class="btn" href="/jarvis">
        Return To Jarvis
    </a>

    <a class="btn" href="#">
        Launch Module
    </a>

    <div class="status">
        MODULE SYSTEM READY
    </div>

</div>

</body>

</html>
