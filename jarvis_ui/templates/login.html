<!DOCTYPE html>
<html>
<head>
    <title>Jarvis Login</title>
    <style>
        body { font-family: Arial; background: #111; color: white; display:flex; justify-content:center; align-items:center; height:100vh;}
        .box { background:#222; padding:30px; border-radius:10px; width:300px; text-align:center;}
        input { width:90%; padding:10px; margin:10px 0; border:none; border-radius:5px;}
        button { width:95%; padding:10px; background:limegreen; border:none; border-radius:5px; cursor:pointer;}
        button:hover { background:green;}
        .error { color:red; }
    </style>
</head>
<body>
    <div class="box">
        <h2>JARVIS Admin Panel</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        {% if error %}
        <p class="error">{{error}}</p>
        {% endif %}

        <p style="margin-top:15px; font-size:12px;">
            admin/admin123<br>
            uploader/upload123<br>
            viewer/view123
        </p>
    </div>
</body>
</html>
