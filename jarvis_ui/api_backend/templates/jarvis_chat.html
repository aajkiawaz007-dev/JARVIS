<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>JARVIS CHAT</title>

<style>

/* =====================================================
   LANGUAGE: HTML + CSS
   PURPOSE:
   JARVIS AI CHAT MODULE UI

   NOTE:
   Minimal JS
   Backend Driven Architecture
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#020817;
    color:white;
    font-family:Arial;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* ================= MAIN CONTAINER ================= */

.chat-container{

    width:90%;
    max-width:1100px;

    height:90vh;

    border:
    2px solid #00e5ff;

    border-radius:20px;

    display:flex;
    flex-direction:column;

    background:
    rgba(0,255,255,0.03);

    box-shadow:
    0 0 25px rgba(0,229,255,0.3);
}

/* ================= HEADER ================= */

.chat-header{

    padding:20px;

    border-bottom:
    1px solid rgba(0,229,255,0.2);

    font-size:28px;

    color:#00e5ff;

    letter-spacing:3px;

    text-align:center;
}

/* ================= CHAT AREA ================= */

.chat-box{

    flex:1;

    padding:20px;

    overflow-y:auto;
}

/* ================= MESSAGE ================= */

.message{

    margin:15px 0;

    padding:15px;

    border-radius:15px;

    max-width:75%;

    line-height:26px;
}

/* ================= USER ================= */

.user-message{

    margin-left:auto;

    background:#00e5ff;

    color:black;
}

/* ================= AI ================= */

.ai-message{

    background:
    rgba(0,255,255,0.08);

    border:
    1px solid rgba(0,229,255,0.3);
}

/* ================= INPUT AREA ================= */

.chat-input-area{

    display:flex;

    padding:20px;

    border-top:
    1px solid rgba(0,229,255,0.2);
}

/* ================= INPUT ================= */

#user-input{

    flex:1;

    padding:15px;

    border:none;

    outline:none;

    border-radius:12px;

    background:#071426;

    color:white;

    font-size:16px;
}

/* ================= BUTTON ================= */

.send-button{

    margin-left:15px;

    padding:15px 28px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    background:#00e5ff;

    color:black;

    font-weight:bold;

    transition:0.3s;
}

.send-button:hover{

    transform:scale(1.05);
}

</style>

</head>

<body>

<!-- =====================================================
     LANGUAGE: HTML
     PURPOSE:
     JARVIS CHAT MODULE
===================================================== -->

<div class="chat-container">

    <!-- ================= HEADER ================= -->

    <div class="chat-header">

        JARVIS AI CHAT MODULE

    </div>

    <!-- ================= CHAT BOX ================= -->

    <div
    class="chat-box"
    id="chat-box">

        <div class="message ai-message">

            Welcome back sir.
            JARVIS AI module online.

        </div>

    </div>

    <!-- ================= INPUT AREA ================= -->

    <div class="chat-input-area">

        <input
        type="text"
        id="user-input"
        placeholder="Enter command...">

        <button
        class="send-button"
        onclick="sendMessage()">

            SEND

        </button>

    </div>

</div>

<script>

/* =====================================================
   LANGUAGE: JAVASCRIPT
   PURPOSE:
   Minimal Frontend Communication Only

   NOTE:
   Real AI Logic Runs In Python Backend
===================================================== */

/* ================= SEND MESSAGE ================= */

async function sendMessage(){

    const input =
    document.getElementById(
        "user-input"
    );

    const chatBox =
    document.getElementById(
        "chat-box"
    );

    const text =
    input.value.trim();

    if(text === "") return;

    /* ================= USER MESSAGE ================= */

    const userMessage =
    document.createElement("div");

    userMessage.className =
    "message user-message";

    userMessage.innerText =
    text;

    chatBox.appendChild(
        userMessage
    );

    input.value = "";

    /* ================= BACKEND REQUEST ================= */

    try{

        const response =
        await fetch(
            "/jarvis-ai",
            {

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                message:text
            })

        });

        const data =
        await response.json();

        /* ================= AI MESSAGE ================= */

        const aiMessage =
        document.createElement("div");

        aiMessage.className =
        "message ai-message";

        aiMessage.innerText =
        data.reply;

        chatBox.appendChild(
            aiMessage
        );

        /* ================= AUTO SCROLL ================= */

        chatBox.scrollTop =
        chatBox.scrollHeight;

    }

    catch(error){

        console.log(error);
    }
}

</script>

</body>
</html>
