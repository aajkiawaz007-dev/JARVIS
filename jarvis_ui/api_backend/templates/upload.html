<!DOCTYPE html>
<html>
<head>
    <title>Upload Request</title>
    <style>
        body { font-family: Arial; background:#111; color:white; padding:20px;}
        .box { background:#222; padding:20px; border-radius:10px; width:400px;}
        input { width:95%; padding:10px; margin-top:10px; border:none; border-radius:5px;}
        button { width:100%; padding:10px; background:limegreen; border:none; border-radius:5px; margin-top:10px;}
        a { color:orange; }
        .msg { color:lime; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Upload Video Request</h2>

        <form method="POST">
            <input type="text" name="title" placeholder="Video Title" required>
            <button type="submit">Send for Approval</button>
        </form>

        {% if msg %}
        <p class="msg">{{msg}}</p>
        {% endif %}

        <p><a href="/user/dashboard">Back</a></p>
    </div>

</body>
</html>
